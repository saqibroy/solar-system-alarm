services:
  wapda-alarm:
    build:
      context: ./server
    restart: unless-stopped
    env_file:
      - /etc/wapda-alarm/wapda-alarm.env
    ports:
      - "127.0.0.1:8088:8088"
    volumes:
      - /etc/wapda-alarm/firebase-service-account.json:/etc/wapda-alarm/firebase-service-account.json:ro
      - /var/lib/wapda-alarm:/var/lib/wapda-alarm
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 160M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8088/health', timeout=10).close()"]
      interval: 90s
      timeout: 15s
      retries: 3
      start_period: 30s
